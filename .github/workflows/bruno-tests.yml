name: Bruno API Tests

on:
  workflow_dispatch:
    inputs:
      testSuite:
        description: 'Test suite to run'
        required: true
        default: 'bruno'
  push:
    branches: [main]

  pull_request:
    branches: [main]

env:
  CI: true
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/workoutcool_test
  BETTER_AUTH_URL: http://127.0.0.1:3000
  NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000

  BETTER_AUTH_SECRET: test_secret_key_32_chars_minimum
  GOOGLE_CLIENT_ID: test_client_id
  GOOGLE_CLIENT_SECRET: test_client_secret
  RESEND_API_KEY: re_test_key
  OPENPANEL_SECRET_KEY: test_secret
  NEXT_PUBLIC_OPENPANEL_CLIENT_ID: test_client_id
  STRIPE_SECRET_KEY: test_secret_key

jobs:

  bruno-tests:

    name: Bruno API Tests

    runs-on: ubuntu-latest

    services:

      postgres:

        image: postgres:16

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: workoutcool_test

        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Sync Database
        run: pnpm prisma db push --skip-generate --accept-data-loss

      - name: Build application
        run: pnpm build

      - name: Start application
        run: pnpm start &

      - name: Wait for server
        run: |
          until curl --silent http://127.0.0.1:3000 > /dev/null
          do
            echo "Waiting for server..."
            sleep 2
          done

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Run Bruno Tests
        run: bru run bruno