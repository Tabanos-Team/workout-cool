name: Performance Testing

on:
  push:
    branches: [christian]
  pull_request:
    branches: [christian]

  workflow_dispatch:

jobs:
  performance-test:
    name: Run k6 Performance Tests
    run: k6 run k6/k6-performance.js

    env:
      BASE_URL: https://workout-cool-ten.vercel.app/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Verify Vercel deployment is reachable
        run: |
          curl -sf --max-time 30 "${{ env.BASE_URL }}/exercises/all" > /dev/null || \
            (echo "::error::No se pudo alcanzar ${{ env.BASE_URL }}/exercises/all -- Vercel puede estar caído o el endpoint cambió." && exit 1)

      - name: Run k6 performance test
        run: |
          k6 run -e RUN_ID=${{ github.run_id }} -e BASE_URL="${{ env.BASE_URL }}" scripts/k6-performance.js

      - name: Upload performance report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-performance-report-${{ github.run_id }}
          path: summary-${{ github.run_id }}.json

      - name: Generate step summary
        if: always()
        run: |
          echo "### Resultados de Pruebas de Rendimiento (k6)" >> $GITHUB_STEP_SUMMARY
          echo "Ejecutado contra: \`${{ env.BASE_URL }}\`" >> $GITHUB_STEP_SUMMARY
          if [ -f summary-${{ github.run_id }}.json ]; then
            echo "El reporte de k6 se generó exitosamente." >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat summary-${{ github.run_id }}.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No se encontró el reporte JSON de k6." >> $GITHUB_STEP_SUMMARY
          fi